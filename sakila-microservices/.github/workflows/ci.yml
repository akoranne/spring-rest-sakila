name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      catalog: ${{ steps.filter.outputs.catalog }}
      customer: ${{ steps.filter.outputs.customer }}
      location: ${{ steps.filter.outputs.location }}
      payment: ${{ steps.filter.outputs.payment }}
      rental: ${{ steps.filter.outputs.rental }}
      store: ${{ steps.filter.outputs.store }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'auth-service/**'
            catalog:
              - 'catalog-service/**'
            customer:
              - 'customer-service/**'
            location:
              - 'location-service/**'
            payment:
              - 'payment-service/**'
            rental:
              - 'rental-service/**'
            store:
              - 'store-service/**'
            infra:
              - 'infrastructure/**'
              - 'docker-compose.yml'
              - '.github/**'

  test:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            changed: ${{ needs.detect-changes.outputs.auth }}
          - name: catalog-service
            changed: ${{ needs.detect-changes.outputs.catalog }}
          - name: customer-service
            changed: ${{ needs.detect-changes.outputs.customer }}
          - name: location-service
            changed: ${{ needs.detect-changes.outputs.location }}
          - name: payment-service
            changed: ${{ needs.detect-changes.outputs.payment }}
          - name: rental-service
            changed: ${{ needs.detect-changes.outputs.rental }}
          - name: store-service
            changed: ${{ needs.detect-changes.outputs.store }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.service.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.service.name }}/package-lock.json

      - name: Install dependencies
        if: matrix.service.changed == 'true'
        working-directory: ${{ matrix.service.name }}
        run: npm ci

      - name: Security audit
        if: matrix.service.changed == 'true'
        working-directory: ${{ matrix.service.name }}
        run: npm audit --audit-level=high || true

      - name: Run tests with coverage
        if: matrix.service.changed == 'true'
        working-directory: ${{ matrix.service.name }}
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          JWT_SECRET: ci-test-secret
        run: npm run test:coverage

      - name: Check coverage threshold
        if: matrix.service.changed == 'true'
        working-directory: ${{ matrix.service.name }}
        run: |
          COVERAGE=$(npx jest --coverage --coverageReporters=json-summary 2>/dev/null | tail -1 || true)
          echo "Coverage report generated. Threshold enforced by jest.config.js (80% lines for service layer)."

      - name: Skip - no changes
        if: matrix.service.changed != 'true'
        run: echo "No changes detected in ${{ matrix.service.name }}, skipping."

  build-images:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service:
          - auth-service
          - catalog-service
          - customer-service
          - location-service
          - payment-service
          - rental-service
          - store-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ${{ matrix.service }}
        run: |
          docker build \
            -t sakila/${{ matrix.service }}:${{ github.sha }} \
            -t sakila/${{ matrix.service }}:latest \
            .

      - name: Verify image
        run: docker images sakila/${{ matrix.service }}
