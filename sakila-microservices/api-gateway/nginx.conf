upstream auth_service {
    server auth-service:3001;
}

upstream catalog_service {
    server catalog-service:3002;
}

upstream customer_service {
    server customer-service:3003;
}

upstream location_service {
    server location-service:3004;
}

upstream payment_service {
    server payment-service:3005;
}

upstream rental_service {
    server rental-service:3006;
}

upstream store_service {
    server store-service:3007;
}

server {
    listen 8080;
    server_name localhost;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Correlation-ID $http_x_correlation_id;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    # Custom 502 error page returning JSON
    error_page 502 /502.json;
    location = /502.json {
        internal;
        default_type application/json;
        return 502 '{"error":{"code":"BAD_GATEWAY","message":"The target service is currently unreachable","details":[],"timestamp":"$time_iso8601"}}';
    }

    # Auth Service
    location /api/v1/login {
        proxy_pass http://auth_service/login;
    }

    # Catalog Service
    location /api/v1/films {
        proxy_pass http://catalog_service/films;
    }

    location /api/v1/actors {
        proxy_pass http://catalog_service/actors;
    }

    # Customer Service
    location /api/v1/customers {
        proxy_pass http://customer_service/customers;
    }

    # Location Service
    location /api/v1/location {
        proxy_pass http://location_service/location;
    }

    # Payment Service
    location /api/v1/payments {
        proxy_pass http://payment_service/payments;
    }

    # Rental Service
    location /api/v1/rentals {
        proxy_pass http://rental_service/rentals;
    }

    # Store Service
    location /api/v1/stores {
        proxy_pass http://store_service/stores;
    }

    location /api/v1/staffs {
        proxy_pass http://store_service/staffs;
    }

    location /api/v1/reports {
        proxy_pass http://store_service/reports;
    }

    # Health check for the gateway itself
    location /health {
        default_type application/json;
        return 200 '{"name":"api-gateway","status":"ok"}';
    }
}
